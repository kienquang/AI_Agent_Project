name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Thay 'kienquang' và 'AI_Agent_Project' bằng Username và tên Space của bạn
        run: git push -f https://kiendao744:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/kiendao744/AI-Agent-Backend main